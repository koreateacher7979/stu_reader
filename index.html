<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>전교학생회장 선거 개표 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: #f1f5f9;
            overflow: hidden; /* 전체 스크롤 방지 */
        }
        .main-container {
            height: calc(100vh - 64px); /* 헤더 제외 높이 */
        }
        .scroll-area {
            scrollbar-width: thin;
            scrollbar-color: #cbd5e1 transparent;
        }
        .scroll-area::-webkit-scrollbar { width: 6px; }
        .scroll-area::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        .candidate-card { transition: all 0.2s ease; }
        .vote-btn:active { transform: scale(0.98); }
        
        /* 개표 화면 전용 컴팩트 스타일 */
        .tally-card {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            min-height: 0; /* flex 자식의 최소 높이 해제 */
        }

        .loading-spinner {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #4f46e5;
            border-radius: 50%;
            width: 14px;
            height: 14px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- Header (Fixed Height) -->
    <header class="h-16 bg-slate-900 text-white px-6 flex items-center justify-between shadow-xl shrink-0">
        <div class="flex items-center gap-3">
            <span class="text-2xl">🗳️</span>
            <h1 class="text-xl font-extrabold tracking-tight">전교학생회장 선거 개표 시스템</h1>
        </div>
        <div class="text-right">
            <p class="text-[10px] md:text-xs opacity-70 font-medium">개발자: 가치있는 미래교육연구소 대표 김병찬</p>
        </div>
    </header>

    <!-- Main Content (Adaptive Area) -->
    <main class="main-container flex-1 p-4 md:p-6 overflow-hidden flex flex-col">
        
        <!-- Step 1: Settings -->
        <section id="setup-section" class="bg-white rounded-3xl shadow-lg border border-slate-200 p-6 flex-1 flex flex-col justify-center max-w-4xl mx-auto w-full overflow-y-auto scroll-area">
            <div class="mb-8 text-center">
                <h2 class="text-3xl font-black text-slate-800 mb-2">시스템 연결 설정</h2>
                <p class="text-slate-500">데이터 수합을 위한 정보를 입력해주세요.</p>
            </div>
            
            <div class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1 ml-1 uppercase">구글 앱스 스크립트 API URL</label>
                    <input type="text" id="api-url" placeholder="https://script.google.com/macros/s/.../exec" 
                        class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-3 focus:ring-2 focus:ring-indigo-500 outline-none transition">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1 ml-1 uppercase">연동할 구글 스프레드시트 URL</label>
                    <input type="text" id="ss-url" placeholder="https://docs.google.com/spreadsheets/d/..." 
                        class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-3 focus:ring-2 focus:ring-indigo-500 outline-none transition">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1 ml-1">학년 선택</label>
                        <select id="grade" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-3 outline-none focus:ring-2 focus:ring-indigo-500 transition">
                            <option value="">학년</option>
                            <script>for(let i=1; i<=6; i++) document.write(`<option value="${i}">${i}학년</option>`);</script>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1 ml-1">학급 선택</label>
                        <select id="class" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-3 outline-none focus:ring-2 focus:ring-indigo-500 transition">
                            <option value="">반</option>
                            <script>for(let i=1; i<=15; i++) document.write(`<option value="${i}">${i}반</option>`);</script>
                        </select>
                    </div>
                </div>
                <button onclick="loadCandidates()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-4 rounded-2xl transition shadow-xl transform active:scale-95 text-lg mt-4">
                    데이터 동기화 및 시작하기
                </button>
            </div>
        </section>

        <!-- Step 2: Candidate Overview (Grid fits screen) -->
        <section id="candidate-section" class="hidden flex-1 flex flex-col overflow-hidden">
            <div class="flex justify-between items-end mb-4 shrink-0">
                <div>
                    <h2 class="text-2xl font-black text-slate-800">후보자 명단</h2>
                    <p class="text-sm text-slate-500">입력된 데이터를 확인해 주세요.</p>
                </div>
                <button onclick="startVoting()" class="bg-emerald-500 hover:bg-emerald-600 text-white px-8 py-3 rounded-2xl font-bold shadow-lg transition transform active:scale-95">
                    개표 시스템 가동
                </button>
            </div>
            <div id="candidate-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 overflow-y-auto scroll-area flex-1 pr-2">
                <!-- Cards -->
            </div>
        </section>

        <!-- Step 3: Voting Interface (Full screen Tally - No Scroll Focus) -->
        <section id="voting-section" class="hidden flex-1 flex flex-col overflow-hidden h-full">
            <div class="flex justify-between items-center mb-4 shrink-0 bg-white p-3 md:p-4 rounded-3xl shadow-sm border border-slate-100">
                <div>
                    <h2 class="text-xl md:text-2xl font-black text-slate-900" id="current-class-display">0-0 개표중</h2>
                    <div id="status-text" class="text-[10px] md:text-xs font-bold text-indigo-600 flex items-center gap-2 mt-0.5">
                        ✓ 서버 연결됨
                    </div>
                </div>
                <button id="finish-btn" onclick="endVoting()" class="bg-red-500 hover:bg-red-600 text-white px-5 py-2 rounded-xl font-bold shadow-md transition text-sm">
                    개표 종료
                </button>
            </div>

            <!-- Tally Grid: Flex based for automatic distribution -->
            <div id="vote-tally-grid" class="flex-1 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3 md:gap-4 overflow-hidden">
                <!-- Tallying Items -->
            </div>

            <div id="result-transfer-area" class="hidden shrink-0 mt-3 bg-slate-900 text-white p-4 md:p-5 rounded-3xl flex flex-col md:flex-row items-center justify-between gap-3 animate-bounce">
                <p class="font-bold text-sm">최종 개표가 완료되었습니다. 전체 수합본에 결과를 저장할까요?</p>
                <button onclick="sendFinalResults()" class="bg-white text-slate-900 px-6 py-2.5 rounded-xl font-black shadow-lg hover:bg-indigo-50 transition text-sm">
                    전교 합산 데이터 전송
                </button>
            </div>
        </section>

    </main>

    <!-- Custom Modal Replacement for Alert -->
    <div id="modal-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[200] hidden items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl">
            <div id="modal-icon" class="text-5xl mb-4">📢</div>
            <h3 id="modal-title" class="text-xl font-black mb-2 text-slate-800">알림</h3>
            <p id="modal-body" class="text-slate-600 mb-6 text-sm leading-relaxed"></p>
            <button onclick="closeModal()" id="modal-btn" class="w-full bg-slate-900 text-white py-3 rounded-2xl font-bold">확인</button>
        </div>
    </div>

    <!-- Toast Message -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-800/95 text-white px-6 py-3 rounded-2xl shadow-2xl opacity-0 transition-opacity duration-300 pointer-events-none z-[300] text-sm font-bold">
        메시지
    </div>

    <script>
        let candidates = [];
        let votes = {};
        let config = { grade: '', class: '', classCode: '', ssUrl: '' };
        let isSyncing = false;
        let pendingSync = false;

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.remove('opacity-0');
            setTimeout(() => t.classList.add('opacity-0'), 2500);
        }

        function openModal(title, body, icon = '📢', callback = null) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-body').innerText = body;
            document.getElementById('modal-icon').innerText = icon;
            document.getElementById('modal-overlay').classList.remove('hidden');
            document.getElementById('modal-overlay').classList.add('flex');
            
            const btn = document.getElementById('modal-btn');
            const newBtn = btn.cloneNode(true);
            btn.parentNode.replaceChild(newBtn, btn);
            newBtn.addEventListener('click', () => {
                closeModal();
                if (callback) callback();
            });
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.add('hidden');
            document.getElementById('modal-overlay').classList.remove('flex');
        }

        async function loadCandidates() {
            const apiUrl = document.getElementById('api-url').value;
            const ssUrl = document.getElementById('ss-url').value;
            const grade = document.getElementById('grade').value;
            const cls = document.getElementById('class').value;

            if(!apiUrl || !ssUrl || !grade || !cls) {
                showToast("모든 설정값을 입력해야 합니다.");
                return;
            }

            config.ssUrl = ssUrl;
            config.grade = grade;
            config.class = cls;
            config.classCode = grade.padStart(2, '0') + cls.padStart(2, '0');

            showToast("데이터를 동기화 중입니다...");

            try {
                const response = await fetch(`${apiUrl}?action=getCandidates&ssUrl=${encodeURIComponent(ssUrl)}`);
                const result = await response.json();
                
                if(result.status === 'success') {
                    candidates = result.data;
                    displayCandidates();
                    document.getElementById('setup-section').classList.add('hidden');
                    document.getElementById('candidate-section').classList.remove('hidden');
                    showToast("후보자 정보를 성공적으로 가져왔습니다.");
                } else {
                    openModal("연결 오류", result.message, "❌");
                }
            } catch (error) {
                openModal("네트워크 오류", "앱스스크립트 URL과 권한 설정을 확인하세요.", "⚠️");
            }
        }

        function displayCandidates() {
            const grid = document.getElementById('candidate-grid');
            grid.innerHTML = '';
            candidates.forEach(c => {
                const card = document.createElement('div');
                card.className = "candidate-card bg-white p-5 rounded-2xl border border-slate-200 shadow-sm flex flex-col justify-between";
                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-center mb-3">
                            <span class="bg-indigo-600 text-white px-3 py-1 rounded-lg text-[10px] font-black tracking-widest">NO.${c.number}</span>
                            <span class="text-[10px] font-bold text-slate-400 uppercase">${c.category}</span>
                        </div>
                        <h3 class="text-lg font-black text-slate-800 mb-2">${c.name} (${c.gender})</h3>
                        <p class="text-xs text-slate-500 leading-relaxed bg-slate-50 p-3 rounded-xl border border-slate-100">
                            ${c.pledge}
                        </p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function startVoting() {
            document.getElementById('candidate-section').classList.add('hidden');
            document.getElementById('voting-section').classList.remove('hidden');
            document.getElementById('current-class-display').innerText = `${config.grade}학년 ${config.class}반 개표 현황`;

            const grid = document.getElementById('vote-tally-grid');
            grid.innerHTML = '';

            // 후보자 수에 따라 그리드 컬럼 동적 최적화 (모바일/데스크탑 대응)
            const count = candidates.length;
            if(count <= 4) {
                grid.className = "flex-1 grid grid-cols-1 md:grid-cols-2 gap-4 overflow-hidden";
            } else if(count <= 8) {
                grid.className = "flex-1 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 overflow-hidden";
            } else {
                grid.className = "flex-1 grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-2 overflow-hidden";
            }

            candidates.forEach(c => {
                votes[c.name] = 0;
                const item = document.createElement('div');
                item.className = "bg-white p-3 md:p-4 rounded-2xl shadow-sm border border-slate-100 tally-card relative";
                item.innerHTML = `
                    <div class="text-[9px] md:text-[10px] text-indigo-500 font-black mb-0.5">${c.category}</div>
                    <div class="text-sm md:text-lg font-extrabold text-slate-800 mb-1 truncate w-full text-center">${c.name}</div>
                    <div class="text-3xl md:text-5xl font-black text-indigo-600 mb-3 md:mb-4" id="count-${c.name}">0</div>
                    <div class="flex gap-1.5 w-full">
                        <button onclick="changeVote('${c.name}', 1)" class="vote-btn flex-1 bg-slate-900 text-white py-2 md:py-3 rounded-xl text-sm md:text-lg font-bold shadow-md">+1</button>
                        <button onclick="changeVote('${c.name}', -1)" class="vote-btn w-10 md:w-12 bg-slate-100 text-slate-400 rounded-xl font-bold">-</button>
                    </div>
                `;
                grid.appendChild(item);
            });
            updateSyncStatus('success');
        }

        async function changeVote(name, amount) {
            if (amount < 0 && votes[name] <= 0) return;
            votes[name] += amount;
            document.getElementById(`count-${name}`).innerText = votes[name];
            syncWithServer();
        }

        function updateSyncStatus(status) {
            const statusEl = document.getElementById('status-text');
            if (status === 'syncing') {
                statusEl.innerHTML = `<span class="loading-spinner"></span> 서버에 기록 중...`;
                statusEl.className = "text-[10px] md:text-xs font-bold text-indigo-500 flex items-center gap-2 mt-1";
            } else if (status === 'success') {
                statusEl.innerHTML = `✓ 모든 득표 실시간 저장됨`;
                statusEl.className = "text-[10px] md:text-xs font-bold text-emerald-500 flex items-center gap-2 mt-1";
            } else if (status === 'error') {
                statusEl.innerHTML = `⚠️ 저장 실패 (인터넷 확인)`;
                statusEl.className = "text-[10px] md:text-xs font-bold text-red-500 flex items-center gap-2 mt-1";
            }
        }

        async function syncWithServer() {
            if (isSyncing) { pendingSync = true; return; }
            isSyncing = true;
            updateSyncStatus('syncing');

            const payload = {
                action: 'saveResults',
                ssUrl: config.ssUrl,
                classCode: config.classCode,
                grade: config.grade,
                class: config.class,
                votes: votes
            };

            try {
                const response = await fetch(document.getElementById('api-url').value, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                updateSyncStatus(result.status === 'success' ? 'success' : 'error');
            } catch (error) {
                updateSyncStatus('error');
            } finally {
                isSyncing = false;
                if (pendingSync) { pendingSync = false; syncWithServer(); }
            }
        }

        function endVoting() {
            openModal("개표 종료", "현재까지의 득표수를 최종 확정하시겠습니까? 종료 후에는 수정할 수 없습니다.", "🏁", () => {
                document.getElementById('result-transfer-area').classList.remove('hidden');
                document.getElementById('finish-btn').classList.add('hidden');
                document.querySelectorAll('.vote-btn').forEach(btn => {
                    btn.disabled = true;
                    btn.classList.add('opacity-30', 'cursor-not-allowed');
                });
            });
        }

        async function sendFinalResults() {
            showToast("전체 합산 시트에 기록 중...");
            await syncWithServer();
            openModal("전송 완료", "본 학급의 개표 결과가 전교 합산 시트에 안전하게 반영되었습니다.", "✅", () => {
                location.reload();
            });
        }
    </script>
</body>
</html>
